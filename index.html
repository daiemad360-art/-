<!DOCTYPE html>

<body>

            <svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">

              <circle cx="160" cy="50" r="20" fill="#ffcc99" />

              <path d="M180 80 C180 110 120 120 120 80" fill="#d18b6d" />

              <path d="M155 70 Q150 80 140 75" stroke="#663300" stroke-width="3" fill="none" />
              <path d="M100 100 Q120 120 140 100" stroke="#663300" stroke-width="4" fill="none" />
              <path d="M84 78 C68 90 60 110 64 125 C68 140 90 150 120 145" stroke="#663300" stroke-width="4" fill="none" />
              <path d="M156 78 C172 90 180 110 176 125 C172 140 150 150 120 145" stroke="#663300" stroke-width="4" fill="none" />
            </svg>
          </div>
          <button id="closeCelebration" class="close-btn">اغلاق</button>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
